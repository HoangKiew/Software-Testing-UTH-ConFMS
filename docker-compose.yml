version: '3.8'

services:
  # =========================
  # Database (PostgreSQL)
  # =========================
  postgres:
    image: postgres:15-alpine
    container_name: uth-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./database/init-script:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - uth-net

  # =========================
  # Identity Service
  # =========================
  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_identity
    depends_on:
      - postgres
    networks:
      - uth-net

  # =========================
  # Review Service
  # =========================
  review-service:
    build:
      context: .
      dockerfile: ./apps/review-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_review
      - JWT_SECRET=bi_mat_khong_duoc_bat_mi_2025
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - CONFERENCE_SERVICE_URL=http://conference-service:3002
      - SUBMISSION_SERVICE_URL=http://submission-service:3003
    depends_on:
      - postgres
      - identity-service
    networks:
      - uth-net

  conference-service:
    build:
      context: .
      dockerfile: ./apps/conference-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_conference
    depends_on:
      - postgres
    networks:
      - uth-net

networks:
  uth-net:
    driver: bridge

volumes:
  postgres_data:
