services:
  postgres:
    image: postgres:15-alpine
    container_name: uth-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres  # ← Bắt buộc để tránh lỗi init
    ports:
      - "5432:5432"  # ← Sửa về 5432:5432 (không dùng 5435)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Nếu bạn có script init, thêm lại sau:
      # - ./database/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - uth-net
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    container_name: uth-identity-service
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: db_identity
      JWT_ACCESS_SECRET: jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
    networks:
      - uth-net
    restart: unless-stopped

  conference-service:
    build:
      context: .
      dockerfile: apps/conference-service/Dockerfile
    container_name: uth-conference-service
    ports:
      - "3002:3002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: db_conference
      JWT_ACCESS_SECRET: jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
      - identity-service
    networks:
      - uth-net
    restart: unless-stopped

networks:
  uth-net:
    driver: bridge

volumes:
  postgres_data: