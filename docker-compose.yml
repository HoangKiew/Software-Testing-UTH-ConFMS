version: '3.8'

services:
  # Database 
  postgres:
    image: postgres:15-alpine
    container_name: uth-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./database/init-script:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5435"
    networks:
      - uth-net

  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_identity
    depends_on:
      - postgres 
    networks:
      - uth-net

  submission-service:
    build:
      context: .
      dockerfile: ./apps/submission-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - SUPABASE_URL=https://blrxodghcsytpqjtwnoo.supabase.co
      - SUPABASE_ANON_KEY=sb_publishable_tcunR__quMCm0PoaiBxHlw_sqJANldF
      - SUPABASE_BUCKET_NAME=submission
      - DB_HOST=postgres               
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123      
      - DB_DATABASE=db_submission
    networks:
      - uth-net
    depends_on:
      - postgres

networks:
  uth-net:
    driver: bridge

volumes:
  postgres_data: