services:
  # =========================
  # Database (PostgreSQL)
  # =========================
  postgres:
    image: postgres:15-alpine
    container_name: uth-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    ports:
      - '5432:5432' # Giữ 5432 để local dev dễ connect
    volumes:
      - ./database/init-script:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uth-net

  # =========================
  # Identity Service
  # =========================
  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_identity
      - JWT_ACCESS_SECRET=jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
    networks:
      - uth-net
    restart: unless-stopped

  # =========================
  # Conference Service
  # =========================
  conference-service:
    build:
      context: .
      dockerfile: apps/conference-service/Dockerfile
    container_name: uth-conference-service
    ports:
      - '3002:3002'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_conference
      - JWT_ACCESS_SECRET=jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
      - identity-service
    networks:
      - uth-net
    restart: unless-stopped

  # =========================
  # Submission Service
  # =========================
  submission-service:
    build:
      context: .
      dockerfile: ./apps/submission-service/Dockerfile
    container_name: uth-submission-service
    ports:
      - '3003:3003'
    environment:
      - SUPABASE_URL=https://your-project.supabase.co
      - SUPABASE_ANON_KEY=your_anon_key_here
      - SUPABASE_BUCKET_NAME=submission
      - SUPABASE_SERVICE_ROLE_KEY=sb_secret_puxOWB6zIThovK-fxUtT9A_WivGpXfK
      - JWT_ACCESS_SECRET=jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
      - CONFERENCE_SERVICE_URL=http://host.docker.internal:3002/api
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_submission
    depends_on:
      - postgres
    networks:
      - uth-net
    restart: unless-stopped

  # =========================
  # Review Service (từ Lebao)
  # =========================
  review-service:
    build:
      context: .
      dockerfile: ./apps/review-service/Dockerfile
    container_name: uth-review-service
    ports:
      - '3004:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_review
      - JWT_SECRET=your_jwt_secret_here
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - CONFERENCE_SERVICE_URL=http://conference-service:3002
      - SUBMISSION_SERVICE_URL=http://submission-service:3003
    depends_on:
      - postgres
      - identity-service
    networks:
      - uth-net
    restart: unless-stopped

  # =========================
  # API Gateway
  # =========================
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: uth-api-gateway
    ports:
      - '3000:3000'
    environment:
      - DOCKER_ENV=true
      - IDENTITY_SERVICE_URL=http://identity-service:3001
    depends_on:
      - identity-service
      - conference-service
      - submission-service
      - review-service
    networks:
      - uth-net
    restart: unless-stopped

networks:
  uth-net:
    driver: bridge

volumes:
  postgres_data: