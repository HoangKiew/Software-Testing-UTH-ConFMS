version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uth-database
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    ports:
      - '5432:5432' # Sửa lại 5432:5432
    volumes:
      - ./database/init-script:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uth-net
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    container_name: uth-identity-service
    ports:
      - '3001:3001'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: db_identity
      JWT_ACCESS_SECRET: jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
    networks:
      - uth-net
    restart: unless-stopped

  conference-service:
    build:
      context: .
      dockerfile: apps/conference-service/Dockerfile
    container_name: uth-conference-service
    ports:
      - '3002:3002'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: db_conference
      JWT_ACCESS_SECRET: jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
    depends_on:
      - postgres
      - identity-service
    networks:
      - uth-net
    restart: unless-stopped

  submission-service:
    build:
      context: .
      dockerfile: ./apps/submission-service/Dockerfile
    container_name: uth-submission-service
    ports:
      - '3003:3003'
    environment:
      - SUPABASE_URL=https://blrxodghcsytpqjtwnoo.supabase.co
      - SUPABASE_ANON_KEY=sb_publishable_tcunR__quMCm0PoaiBxHlw_sqJANldF
      - SUPABASE_BUCKET_NAME=submission
      - SUPABASE_SERVICE_ROLE_KEY=sb_secret_puxOWB6zIThovK-fxUtT9A_WivGpXfK
      - JWT_ACCESS_SECRET=jZE6YIUoP_j7SOTLPWgS8kSfX5g4dlOmPMWJVNLMOyg-SMoqXiMRkR0ocJQEGr9HVUjonNIlZNwHzduFfOCJOQ
      - CONFERENCE_SERVICE_URL=http://host.docker.internal:3002/api
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=db_submission
    depends_on:
      - postgres
    networks:
      - uth-net
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: uth-api-gateway
    ports:
      - '3000:3000'
    environment:
      - DOCKER_ENV=true
      - IDENTITY_SERVICE_URL=http://identity-service:3001
    depends_on:
      - identity-service
      - conference-service
      - submission-service
    networks:
      - uth-net
    restart: unless-stopped

networks:
  uth-net:
    driver: bridge

volumes:
  postgres_data:
