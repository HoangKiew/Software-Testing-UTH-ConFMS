<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Review Service Tester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }
    button {
      margin-top: 16px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      margin-top: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>📝 Review Service Tester</h2>

  <label>Review ID</label>
  <input id="reviewId" type="number" value="11" />

  <label>Score (0 - 10)</label>
  <input id="score" type="number" min="0" max="10" />

  <label>Comment</label>
  <textarea id="comment"></textarea>

  <label>Decision</label>
  <select id="decision">
    <option value="">-- chọn --</option>
    <option value="accept">Accept</option>
    <option value="reject">Reject</option>
    <option value="revise">Revise</option>
  </select>

  <label>
    <input id="submitted" type="checkbox" />
    Đã nộp review
  </label>

  <button onclick="submitReview()">Gửi Review</button>

  <pre id="result"></pre>

  <script>
    async function submitReview() {
      const id = document.getElementById('reviewId').value;

      const payload = {
        score: Number(document.getElementById('score').value),
        comment: document.getElementById('comment').value,
        decision: document.getElementById('decision').value,
        submitted: document.getElementById('submitted').checked
      };

      const res = await fetch(`http://localhost:3004/reviews/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById('result').innerText =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
